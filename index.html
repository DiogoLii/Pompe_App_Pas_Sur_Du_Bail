<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PUMP OR BLOCK - CREDITS MODE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        :root { 
            --bg: #000; 
            --primary: #1e847f; 
            --accent: #ecc19c; 
            --success: #2ecc71; 
        }

        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--accent); 
            overflow: hidden; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
        }

        /* Caméra Plein Écran */
        .container { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; 
        }

        video { display: none; }
        canvas { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        /* UI Overlays */
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; display: flex; flex-direction: column; 
            justify-content: space-between; pointer-events: none; 
        }

        #header { 
            padding: env(safe-area-inset-top) 20px 20px 20px; 
            text-align: center; 
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); 
            pointer-events: auto; 
        }

        #counter { font-size: 8rem; font-weight: 900; color: var(--primary); line-height: 1; }
        #earned-points { 
            font-size: 1.2rem; color: #fff; font-weight: bold; 
            padding: 8px 15px; border: 2px solid var(--accent); 
            border-radius: 12px; display: inline-block; 
            background: rgba(0,0,0,0.5); 
        }

        #btn-valider { 
            background: var(--success); color: #fff; border: none; 
            padding: 20px 40px; font-size: 1.4rem; font-weight: 900; 
            border-radius: 50px; margin-top: 20px; display: none; 
            pointer-events: auto; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }

        #footer { 
            padding: 20px 20px calc(env(safe-area-inset-bottom) + 15px) 20px; 
            text-align: center; background: var(--primary); 
            color: #fff; font-weight: 800; text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="ui-layer">
        <div id="header">
            <div id="counter">0</div>
            <div id="earned-points">0 CRÉDITS</div>
            <br>
            <button id="btn-valider" onclick="envoyerPoints()">ENCAISSER LES CRÉDITS</button>
        </div>
        <div id="footer">SCANNE EN COURS...</div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const instruction = document.getElementById('footer');
        const counterUI = document.getElementById('counter');
        const pointsUI = document.getElementById('earned-points');
        const btnValider = document.getElementById('btn-valider');
        
        let count = 0;
        let position = "up"; 

        function calculateAngle(a, b, c) {
            let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return angle;
        }

        // ENVOI DU NOMBRE PUR AU RACCOURCI
        function envoyerPoints() {
            let points = Math.floor(count / 2); // 2 pompes = 1 crédit
            if(points > 0) {
                // On envoie juste le chiffre au raccourci
                window.location.href = "shortcuts://run-shortcut?name=ValiderPompes&input=" + points;
                
                setTimeout(() => {
                    count = 0;
                    counterUI.innerText = "0";
                    pointsUI.innerText = "0 CRÉDITS";
                    btnValider.style.display = "none";
                }, 1000);
            }
        }

        function onResults(results) {
            // Adaptabilité HD
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (!results.poseLandmarks) {
                instruction.innerText = "PLACE-TOI DANS LE CADRE";
                canvasCtx.restore();
                return;
            }

            const lS = results.poseLandmarks[11]; const lE = results.poseLandmarks[13]; const lW = results.poseLandmarks[15];
            const rS = results.poseLandmarks[12]; const rE = results.poseLandmarks[14]; const rW = results.poseLandmarks[16];

            const visible = lE.visibility > 0.5 && rE.visibility > 0.5;

            if (visible) {
                const angleL = calculateAngle(lS, lE, lW);
                const angleR = calculateAngle(rS, rE, rW);
                
                const lineSize = Math.max(4, Math.round(canvasElement.width / 120));
                drawConnectors(canvasCtx, results.poseLandmarks, [[11,13], [13,15], [12,14], [14,16]], {color: '#1e847f', lineWidth: lineSize});

                if (angleL < 100 && angleR < 100 && position === "up") {
                    position = "down";
                    instruction.innerText = "REMONTE !";
                }
                else if (angleL > 155 && angleR > 155 && position === "down") {
                    position = "up";
                    count++;
                    counterUI.innerText = count;
                    let pts = Math.floor(count / 2);
                    pointsUI.innerText = pts + " CRÉDIT" + (pts > 1 ? "S" : "");
                    if (pts >= 1) btnValider.style.display = "inline-block";
                    instruction.innerText = "PARFAIT !";
                }
            } else {
                instruction.innerText = "COUDES NON VISIBLES";
            }
            canvasCtx.restore();
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: { ideal: 1920 }, height: { ideal: 1080 },
            facingMode: "user"
        });
        camera.start();
    </script>
</body>
</html>
