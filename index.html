<!DOCTYPE html>
<html>
<head>
    <title>PUSH-UP OR SHUT-UP : MEDIAPIPE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        body { font-family: 'Courier New', monospace; text-align: center; background: #000; color: #ecc19c; margin: 0; overflow: hidden; }
        #counter { font-size: 8rem; font-weight: 900; color: #1e847f; position: absolute; top: 10px; width: 100%; z-index: 10; pointer-events: none; }
        #instruction { background: #1e847f; color: #fff; padding: 15px; font-weight: bold; position: absolute; bottom: 0; width: 100%; z-index: 10; }
        .container { position: relative; width: 100vw; height: 100vh; background: #000; }
        video { display: none; } /* On cache la vidéo brute */
        canvas { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
    </style>
</head>
<body>
    <div id="counter">0</div>
    <div id="instruction">CHARGEMENT DE L'IA...</div>
    
    <div class="container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const instruction = document.getElementById('instruction');
        
        let count = 0;
        let position = "up";

        function onResults(results) {
            if (!results.poseLandmarks) {
                instruction.innerText = "PLACE-TOI DEVANT LA CAMÉRA";
                return;
            }

            // Dessin
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Dessiner le squelette MediaPipe
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
                {color: '#1e847f', lineWidth: 4});
            drawLandmarks(canvasCtx, results.poseLandmarks,
                {color: '#ecc19c', lineWidth: 2, radius: 5});

            // Logique de pompe (Épaules : points 11 et 12)
            const shoulderL = results.poseLandmarks[11];
            const shoulderR = results.poseLandmarks[12];
            const avgY = (shoulderL.y + shoulderR.y) / 2;

            // MediaPipe donne des valeurs entre 0 et 1 (0 = haut, 1 = bas)
            const seuilBas = 0.75;  // 75% du bas de l'écran
            const seuilHaut = 0.50; // 50% du haut de l'écran

            if (position === "up") {
                instruction.innerText = "DESCENDEZ";
                if (avgY > seuilBas) {
                    position = "down";
                    document.body.style.background = "#1e847f";
                }
            } else {
                instruction.innerText = "REMONTEZ";
                if (avgY < seuilHaut) {
                    position = "up";
                    count++;
                    document.getElementById('counter').innerText = count;
                    document.body.style.background = "#000";
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
