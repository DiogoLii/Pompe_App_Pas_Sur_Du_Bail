<!DOCTYPE html>
<html>
<head>
    <title>PUSH-UP OR SHUT-UP : ANTI-TRICHE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #000000; color: #ecc19c; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #counter { font-size: 6rem; font-weight: bold; color: #1e847f; margin: 0; }
        #debug-text { font-size: 0.8rem; background: #222; padding: 5px; min-height: 40px; }
        .container { position: relative; width: 100vw; flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
        canvas { z-index: 2; }
    </style>
</head>
<body>
    <h1>MODE SQUELETTE COMPLET</h1>
    <div id="counter">0</div>
    <div id="debug-text">Initialisation...</div>
    
    <div class="container">
        <video id="video" playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <script>
        let count = 0;
        let position = "up"; 
        const video = document.getElementById('video');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');

        async function main() {
            const net = await posenet.load();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.play();
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                detectPose(net);
            };
        }

        function drawPoint(y, x, r, color) {
            ctx.beginPath(); ctx.arc(x, y, r, 0, 2 * Math.PI); ctx.fillStyle = color; ctx.fill();
        }

        async function detectPose(net) {
            const pose = await net.estimateSinglePose(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const shoulderL = pose.keypoints.find(k => k.part === 'leftShoulder');
            const shoulderR = pose.keypoints.find(k => k.part === 'rightShoulder');
            const wristL = pose.keypoints.find(k => k.part === 'leftWrist');
            const wristR = pose.keypoints.find(k => k.part === 'rightWrist');

            // Dessiner les points détectés pour debug
            [shoulderL, shoulderR, wristL, wristR].forEach(p => {
                if (p && p.score > 0.5) drawPoint(p.position.y, p.position.x, 8, "#1e847f");
            });

            if (shoulderL && shoulderR && shoulderL.score > 0.5 && shoulderR.score > 0.5) {
                // On calcule la moyenne de hauteur des épaules
                const avgShoulderY = (shoulderL.position.y + shoulderR.position.y) / 2;
                
                // On définit le "sol" par rapport au bas de l'image (75% de la hauteur)
                const solVirtuel = canvas.height * 0.75;
                const positionHaute = canvas.height * 0.45;

                // Dessiner les lignes de seuil
                ctx.beginPath(); ctx.moveTo(0, solVirtuel); ctx.lineTo(canvas.width, solVirtuel); ctx.strokeStyle = "red"; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, positionHaute); ctx.lineTo(canvas.width, positionHaute); ctx.strokeStyle = "green"; ctx.stroke();

                document.getElementById('debug-text').innerText = `Hauteur Épaules : ${Math.round(avgShoulderY)} | Objectif Bas : ${Math.round(solVirtuel)}`;

                // LOGIQUE : Les épaules doivent descendre vers le sol virtuel
                if (avgShoulderY > solVirtuel && position === "up") {
                    position = "down";
                    document.body.style.background = "#1e847f";
                } 
                else if (avgShoulderY < positionHaute && position === "down") {
                    position = "up";
                    count++;
                    document.getElementById('counter').innerText = count;
                    document.body.style.background = "#000000";
                }
            } else {
                document.getElementById('debug-text').innerText = "Place tes deux épaules face à la caméra !";
            }
            requestAnimationFrame(() => detectPose(net));
        }
        main();
    </script>
</body>
</html>
